name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint-and-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'pnpm'

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Typecheck (Svelte)
        run: pnpm typecheck

      - name: CSpell
        run: pnpm cspell

      - name: Lint
        run: pnpm lint || true   # non-blocking until full eslint rules

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'pnpm'

      - name: Install Rust (stable + targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Build for Apple Silicon (most common)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: '--target aarch64-apple-darwin'

      - name: Upload .dmg artifact (installable on macOS)
        uses: actions/upload-artifact@v4
        with:
          name: diskanalyzer-macos-aarch64
          path: |
            src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app
          if-no-files-found: warn
          retention-days: 14

      - name: Get version
        id: get_version
        run: |
          VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Release with DMG
        uses: softprops/action-gh-release@v3
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          tag_name: v${{ steps.get_version.outputs.version }}-${{ github.run_number }}
          name: DiskAnalyzer v${{ steps.get_version.outputs.version }} (build ${{ github.run_number }})
          body: |
            ## 🚀 DiskAnalyzer - Professional macOS Disk Usage Visualizer

            Automated build from commit [${{ github.sha }}](https://github.com/dongitran/diskanalyzer/commit/${{ github.sha }})

            ### 📥 Download for macOS

            - **DiskAnalyzer.dmg** (Apple Silicon / M1/M2/M3/M4 recommended)

            ### 🛠️ Installation

            1. Download the `.dmg` from the assets below
            2. Open it and drag **DiskAnalyzer** to your `/Applications` folder
            3. First launch: Right-click the app → **Open** (bypass Gatekeeper for unsigned builds)
            4. For full disk scans from `/`: Grant **Full Disk Access** in  
               System Settings → Privacy & Security → Full Disk Access

            See the [README](https://github.com/dongitran/diskanalyzer#readme) for features, screenshots, and development instructions.

            > This is a pre-release build. Stable releases will be tagged manually.
          draft: false
          prerelease: true
          files: |
            src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Optional: also build Intel for completeness (slower, can comment)
      # - name: Build Intel
      #   uses: tauri-apps/tauri-action@v0
      #   with:
      #     args: '--target x86_64-apple-darwin'
