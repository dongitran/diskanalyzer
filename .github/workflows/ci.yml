name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint-and-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'pnpm'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Typecheck (Svelte)
        run: pnpm typecheck

      - name: CSpell
        run: pnpm cspell

      - name: Lint
        run: pnpm lint || true   # non-blocking until full eslint rules

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'pnpm'

      - name: Install Rust (stable + targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Build for Apple Silicon (most common)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: '--target aarch64-apple-darwin'

      - name: Upload .dmg artifact (installable on macOS)
        uses: actions/upload-artifact@v4
        with:
          name: disk-analyzer-macos-aarch64
          path: |
            src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app
          if-no-files-found: warn
          retention-days: 14

      # Optional: also build Intel for completeness (slower, can comment)
      # - name: Build Intel
      #   uses: tauri-apps/tauri-action@v0
      #   with:
      #     args: '--target x86_64-apple-darwin'
